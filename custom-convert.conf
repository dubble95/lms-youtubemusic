# YouTube Music transcoding rules using ffmpeg
aac flc * *
	# FRD:{RESAMPLE=-r %d}
	[ffmpeg] -loglevel quiet -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 -i $FILE$ -f flac -

aac mp3 * *
	# FRB:{BITRATE=-b:a %B}D:{RESAMPLE=-ar %D}
	[ffmpeg] -loglevel quiet -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 -i $FILE$ -f mp3 $BITRATE$ $RESAMPLE$ -

aac pcm * *
	# FR
	[ffmpeg] -loglevel quiet -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 -i $FILE$ -f s16le -
